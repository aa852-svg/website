<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agincourt Arsenal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #1C1C1C;
    --tan: #D6C7B8;
    --tan60: rgba(214,199,184,0.6);
    --tan20: rgba(214,199,184,0.12);
    --white: #FFFFFF;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 45%, transparent 40%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    border-bottom: 1px solid rgba(214,199,184,0.08);
  }

  .nav-logo {
    height: 22px;
    width: auto;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 0.3s forwards;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 40px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 0.5s forwards;
  }

  .nav-right a {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--tan60);
    text-decoration: none;
    transition: color 0.25s;
  }

  .nav-right a:hover { color: var(--tan); }

  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 48px 80px;
  }

  .hero-bg-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -54%);
    width: 520px;
    height: 520px;
    opacity: 0.06;
    pointer-events: none;
    animation: slowSpin 60s linear infinite;
    mix-blend-mode: screen;
  }

  @keyframes slowSpin {
    from { transform: translate(-50%, -54%) rotate(0deg) scale(1); }
    50%  { transform: translate(-50%, -54%) rotate(180deg) scale(1.04); }
    to   { transform: translate(-50%, -54%) rotate(360deg) scale(1); }
  }

  .hero-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--tan);
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 0.6s forwards;
  }

  .hero-logo {
    width: min(580px, 78vw);
    height: auto;
    opacity: 0;
    animation: fadeUp 1.1s cubic-bezier(.22,.68,0,1.2) 0.8s forwards;
  }

  .hero-divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, var(--tan60), transparent);
    margin: 52px auto;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 1.1s forwards;
  }

  .hero-sub {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(214,199,184,0.45);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 1.3s forwards;
  }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-top: 1px solid rgba(214,199,184,0.08);
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(.22,.68,0,1.2) 1.6s forwards;
  }

  .footer-left {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  .footer-right {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: fixed;
    width: 20px;
    height: 20px;
    z-index: 200;
    opacity: 0.25;
  }

  .corner-tl { top: 16px; left: 16px; border-top: 1px solid var(--tan); border-left: 1px solid var(--tan); }
  .corner-tr { top: 16px; right: 16px; border-top: 1px solid var(--tan); border-right: 1px solid var(--tan); }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--tan); border-left: 1px solid var(--tan); }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--tan); border-right: 1px solid var(--tan); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    nav { padding: 20px 24px; }
    .nav-right { gap: 24px; }
    .hero { padding: 100px 24px 60px; }
    .hero-logo { width: min(400px, 88vw); }
    .hero-bg-icon { width: 280px; height: 280px; }
    footer { padding: 16px 24px; }
    .corner-tl, .corner-tr, .corner-bl, .corner-br { display: none; }
    .footer-left { display: none; }
  }
</style>
</head>

<div class="corner-bl"></div>
<div class="corner-br"></div>
